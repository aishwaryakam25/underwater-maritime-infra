<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="g3" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="94" fill="#0A0E1A" stroke="url(#g1)" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="86" fill="url(#g3)" stroke="url(#g2)" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Sonar rings -->
  <circle cx="100" cy="95" r="55" fill="none" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="100" cy="95" r="40" fill="none" stroke="#22D3EE" stroke-width="0.8" stroke-opacity="0.12"/>
  <circle cx="100" cy="95" r="25" fill="none" stroke="#22D3EE" stroke-width="0.6" stroke-opacity="0.10"/>
  <!-- Waves (top) -->
  <path d="M30 60 Q50 50 70 60 Q90 70 110 60 Q130 50 150 60 Q170 70 170 60" stroke="url(#g1)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>
  <path d="M35 70 Q55 62 75 70 Q95 78 115 70 Q135 62 155 70 Q165 75 165 70" stroke="url(#g2)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-opacity="0.35"/>
  <!-- Anchor / detection symbol -->
  <g transform="translate(100,100)">
    <!-- Vertical line -->
    <line x1="0" y1="-22" x2="0" y2="28" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Crossbar -->
    <line x1="-16" y1="-10" x2="16" y2="-10" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
    <!-- Anchor curve -->
    <path d="M-20 18 Q-20 36 0 36 Q20 36 20 18" stroke="url(#g2)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Detection dot (eye/sonar ping) -->
    <circle cx="0" cy="-22" r="5" fill="#22D3EE" opacity="0.9"/>
    <circle cx="0" cy="-22" r="2.5" fill="#fff" opacity="0.8"/>
    <!-- Side arrows (detection beams) -->
    <path d="M-28 0 L-20 -6 L-20 6 Z" fill="#8B5CF6" opacity="0.5"/>
    <path d="M28 0 L20 -6 L20 6 Z" fill="#22D3EE" opacity="0.5"/>
  </g>
  <!-- "N" letter subtle watermark -->
  <text x="100" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="18" letter-spacing="4" fill="url(#g1)" opacity="0.7">NAUTICAI</text>
</svg>

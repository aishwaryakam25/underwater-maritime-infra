server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API calls go from the browser to the backend URL (REACT_APP_API_URL)
    # when frontend and backend are deployed as separate Cloud Run services.
}
